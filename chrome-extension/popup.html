<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TenderSync Pro Engine</title>
  <style>
    :root {
      --bg-primary:   #0f172a;
      --bg-secondary: #1e293b;
      --bg-card:      #1a2744;
      --accent:       #3b82f6;
      --accent-dim:   rgba(59,130,246,0.15);
      --green:        #22c55e;
      --amber:        #f59e0b;
      --red:          #ef4444;
      --text-primary: #f8fafc;
      --text-muted:   #64748b;
      --border:       rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1d3461 100%);
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59,130,246,0.4);
    }
    .header-text h1 {
      font-size: 14px; font-weight: 700; letter-spacing: 0.3px; color: var(--text-primary);
    }
    .header-text p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .version-badge {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 10px; font-weight: 600;
      padding: 3px 7px; border-radius: 20px; border: 1px solid rgba(59,130,246,0.3);
    }

    /* Connection status */
    .conn-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.paused    { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .conn-dot.captcha   { background: var(--amber); animation: blink 1s step-end infinite; }
    #conn-label { color: var(--text-muted); font-weight: 500; }

    /* Matrix Configurations */
    .config-section {
      padding: 14px 18px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
    }
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .form-control {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--accent);
    }
    .form-row {
      display: flex;
      gap: 10px;
    }
    .half-width {
      flex: 1;
    }

    /* Metrics Control Bar */
    .metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .metric {
      background: var(--bg-secondary);
      padding: 10px; text-align: center;
    }
    .metric-val {
      font-size: 18px; font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .metric-val.green { color: var(--green); }
    .metric-val.red   { color: var(--red); }
    .metric-lbl {
      font-size: 9px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* Engine Control Dashboard Actions */
    .actions {
      padding: 14px 18px;
      display: flex; gap: 8px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .btn {
      flex: 1; padding: 9px 10px;
      border-radius: 6px; border: none;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
    }
    .btn-play { background: var(--accent); color: white; }
    .btn-play:hover:not(:disabled) { background: #2563eb; }
    
    .btn-pause { background: rgba(245, 158, 11, 0.2); color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.4); }
    .btn-pause:hover:not(:disabled) { background: rgba(245, 158, 11, 0.3); }
    
    .btn-stop { background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.4); }
    .btn-stop:hover:not(:disabled) { background: rgba(239, 68, 68, 0.3); }
    
    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Live Log Console */
    .log-section { padding: 12px 18px; }
    .section-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .log-box {
      background: #090d16;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      height: 110px;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      color: #94a3b8;
    }
    .log-line { margin-bottom: 2px; line-height: 1.4; }
    .log-line.info    { color: #64748b; }
    .log-line.success { color: var(--green); }
    .log-line.warn    { color: var(--amber); }
    .log-line.error   { color: var(--red); }

    /* Footer ID row */
    .ext-id-row {
      padding: 8px 18px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ext-id-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .ext-id-val {
      font-family: monospace; font-size: 9px;
      color: #60a5fa; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 12px; padding: 2px;
    }
    .copy-btn:hover { color: var(--text-primary); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">🏛️</div>
    <div class="header-text">
      <h1>TenderSync Pro Engine</h1>
      <p>Procurement Intelligence Suite</p>
    </div>
    <span class="version-badge">v3.0</span>
  </div>

  <div class="conn-bar">
    <div class="conn-dot connected" id="conn-dot"></div>
    <span id="conn-label">Engine Ready</span>
  </div>

  <div class="config-section">
    <div class="form-group">
      <label for="portal-select">Target Platform Hub</label>
      <select id="portal-select" class="form-control">
        <option value="gem">Government e-Marketplace (GeM)</option>
        <option value="tendersontime">Tenders On Time (TOT)</option>
        <option value="tender247">Tender247 Engine</option>
      </select>
    </div>

    <div class="form-group" id="keyword-wrapper">
      <label for="txt-keywords">Search Keywords (Comma Separated)</label>
      <input type="text" id="txt-keywords" class="form-control" placeholder="e.g. Note Sorting Machines, Hardware">
    </div>

    <div class="form-row" id="date-range-block">
      <div class="form-group half-width">
        <label for="date-start">From Date</label>
        <input type="date" id="date-start" class="form-control">
      </div>
      <div class="form-group half-width">
        <label for="date-end">To Date</label>
        <input type="date" id="date-end" class="form-control">
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-play" id="btn-start">
      <svg width="12" height="12" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg> Run
    </button>
    <button class="btn btn-pause" id="btn-pause" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> Pause
    </button>
    <button class="btn btn-stop" id="btn-stop" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h12v12H6z"/></svg> Stop
    </button>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-val" id="m-found">0</div>
      <div class="metric-lbl">Found</div>
    </div>
    <div class="metric">
      <div class="metric-val green" id="m-done">0</div>
      <div class="metric-lbl">Extracted</div>
    </div>
    <div class="metric">
      <div class="metric-val red" id="m-fail">0</div>
      <div class="metric-lbl">Failed</div>
    </div>
  </div>

  <div class="log-section">
    <div class="section-label">System Terminal Log</div>
    <div class="log-box" id="log-box">
      <div class="log-line info">[System] Initialized. Awaiting operational input parameters...</div>
    </div>
  </div>

  <div class="ext-id-row">
    <span class="ext-id-label">Ext ID:</span>
    <span class="ext-id-val" id="ext-id-val">Loading...</span>
    <button class="copy-btn" id="copy-id-btn" title="Copy Extension ID">📋</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

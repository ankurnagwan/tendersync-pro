<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeM Aggregator</title>
  <style>
    :root {
      --bg-primary:   #0f172a;
      --bg-secondary: #1e293b;
      --bg-card:      #1a2744;
      --accent:       #3b82f6;
      --accent-dim:   rgba(59,130,246,0.15);
      --green:        #22c55e;
      --amber:        #f59e0b;
      --red:          #ef4444;
      --text-primary: #f8fafc;
      --text-muted:   #64748b;
      --border:       rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1d3461 100%);
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59,130,246,0.4);
    }
    .header-text h1 {
      font-size: 14px; font-weight: 700; letter-spacing: 0.3px; color: var(--text-primary);
    }
    .header-text p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .version-badge {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 10px; font-weight: 600;
      padding: 3px 7px; border-radius: 20px; border: 1px solid rgba(59,130,246,0.3);
    }

    /* Connection status */
    .conn-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.captcha   { background: var(--amber); animation: blink 1s step-end infinite; }
    #conn-label { color: var(--text-muted); }

    /* Metrics */
    .metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .metric {
      background: var(--bg-secondary);
      padding: 12px 10px; text-align: center;
    }
    .metric-val {
      font-size: 20px; font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .metric-val.green { color: var(--green); }
    .metric-val.red   { color: var(--red); }
    .metric-lbl {
      font-size: 9px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Jobs list */
    .jobs-section { padding: 12px 18px; }
    .section-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .job-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .job-top {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .job-portal {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
    }
    .job-portal.gem { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .job-portal.tot { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .job-status { margin-left: auto; font-size: 10px; font-weight: 600; }
    .job-status.running  { color: var(--accent); }
    .job-status.done     { color: var(--green); }
    .job-status.failed   { color: var(--red); }
    .job-status.captcha  { color: var(--amber); animation: blink 1s step-end infinite; }
    .job-status.queued   { color: var(--text-muted); }
    .job-progress {
      height: 3px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .job-progress-bar {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.5s ease;
    }
    .job-stats {
      display: flex; gap: 12px; margin-top: 5px;
      font-size: 10px; color: var(--text-muted);
    }
    .job-stats span b { color: var(--text-primary); }

    .no-jobs {
      text-align: center; padding: 16px;
      color: var(--text-muted); font-size: 12px;
    }
    .no-jobs .emoji { font-size: 24px; display: block; margin-bottom: 6px; }

    /* Log */
    .log-section {
      padding: 0 18px 12px;
    }
    .log-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 100px;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }
    .log-line.info    { color: #94a3b8; }
    .log-line.success { color: var(--green); }
    .log-line.warn    { color: var(--amber); }
    .log-line.error   { color: var(--red); }

    /* Actions */
    .actions {
      padding: 10px 18px 14px;
      display: flex; gap: 8px;
    }
    .btn {
      flex: 1; padding: 8px 12px;
      border-radius: 6px; border: none;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost {
      background: var(--bg-secondary);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }

    /* Extension ID copy */
    .ext-id-row {
      padding: 8px 18px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ext-id-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .ext-id-val {
      font-family: monospace; font-size: 9px;
      color: #60a5fa; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 13px; padding: 2px;
    }
    .copy-btn:hover { color: var(--text-primary); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">🏛️</div>
    <div class="header-text">
      <h1>GeM Aggregator Engine</h1>
      <p>Procurement Intelligence Suite</p>
    </div>
    <span class="version-badge">v2.0</span>
  </div>

  <div class="conn-bar">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-label">Checking dashboard connection…</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-val" id="m-found">—</div>
      <div class="metric-lbl">Found Today</div>
    </div>
    <div class="metric">
      <div class="metric-val green" id="m-done">—</div>
      <div class="metric-lbl">Downloaded</div>
    </div>
    <div class="metric">
      <div class="metric-val red" id="m-fail">—</div>
      <div class="metric-lbl">Failed</div>
    </div>
  </div>

  <div class="jobs-section">
    <div class="section-label">Active Jobs</div>
    <div id="jobs-list">
      <div class="no-jobs">
        <span class="emoji">💤</span>
        No active jobs. Open your dashboard to start a scrape.
      </div>
    </div>
  </div>

  <div class="log-section">
    <div class="section-label" style="padding: 0 0 6px">Live Log</div>
    <div class="log-box" id="log-box">
      <div class="log-line info">Waiting for activity…</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="open-dashboard-btn">Open Dashboard</button>
    <button class="btn btn-ghost" id="stop-all-btn">Stop All</button>
  </div>

  <div class="ext-id-row">
    <span class="ext-id-label">Ext ID</span>
    <span class="ext-id-val" id="ext-id-val">Loading…</span>
    <button class="copy-btn" id="copy-id-btn" title="Copy Extension ID">📋</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
